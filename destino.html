<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nueva Aventura Monterrey</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyC4FVokHFRbbTc4rBifNyt5bvOX2CuzkWw",
authDomain:"calificaciones-9f753.firebaseapp.com",
projectId:"calificaciones-9f753"};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db,"destinos"), snap=>{
  lista.innerHTML="";
  snap.forEach(doc=>{
    const d=doc.data();

    lista.innerHTML+=`
    <div class="card">
      <h2>${d.destino}</h2>
      <p>📅 ${d.fecha}</p>
      <p>💰 $${d.precio}</p>
      <p>⏳ ${d.dias} días</p>
      <button onclick="reservar('${d.destino}')">Reservar</button>
    </div>`;
  });
  
});

window.reservar = (destino)=>{
  alert("Reservando viaje a " + destino);
}
</script>

<style>
body{font-family:Arial;background:#111;color:#fff}
.card{
  background:#222;
  margin:20px;
  padding:20px;
  border-radius:15px;
}
button{
  background:#00c853;
  border:none;
  padding:10px;
  color:#fff;
}
</style>
</head>

<body>

<h1>🌎 Nueva Aventura Monterrey</h1>
<div id="lista"></div>

</body>
</html>
