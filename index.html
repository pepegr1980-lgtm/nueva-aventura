<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Aventura</title>

  <link rel="manifest" href="manifest.json">
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
  </script>

  <style>
    body { font-family: Arial; background:#f2f2f2; margin:0; }
    .container { max-width:400px; margin:auto; padding:20px; }
    form { background:white; padding:20px; border-radius:12px; }
    input, select, button {
      width:100%; padding:14px; margin-top:10px;
      border-radius:8px; border:1px solid #ccc;
    }
    button { background:#007bff; color:white; }
    #mensaje { text-align:center; margin-top:10px; }
  </style>
</head>

<body>
<div class="container">
<h2>Reserva tu viaje</h2>

<form id="formulario">
<input type="text" name="nombre" placeholder="Nombre" required>
<input type="tel" name="telefono" placeholder="Teléfono" required>

<select name="destino" required>
<option value="">Selecciona destino</option>
<option value="Cancun">Cancún</option>
<option value="Mazatlan">Mazatlán</option>
<option value="Monterrey">Monterrey</option>
</select>

<input type="date" name="fecha" required>
<input type="number" name="personas" placeholder="Personas" required>

<button type="submit">Reservar</button>
</form>

<p id="mensaje"></p>
</div>

<script>
document.getElementById("formulario").addEventListener("submit", function(e){
e.preventDefault();

const datos = {
nombre:this.nombre.value,
telefono:this.telefono.value,
destino:this.destino.value,
fecha:this.fecha.value,
personas:this.personas.value
};

fetch("https://script.google.com/macros/s/AKfycbwkD_vrNDyyDUv1i0Su2QNZiopDDySTCfSdBwlCn-2cuiWctawkArn3GCZR83fD4oI/exec",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(datos)
})
.then(res=>res.json())
.then(r=>{
document.getElementById("mensaje").innerText="Guardado correctamente";
this.reset();
})
.catch(()=>{
document.getElementById("mensaje").innerText="Error de conexión";
});
});
</script>

</body>
</html>
